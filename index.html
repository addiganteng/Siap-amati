<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>200 IMPOSSIBLE CHALLENGE - ADDI CANGGIH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nosifer&family=Orbitron:wght@900&family=Poppins:wght@300;600&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; cursor: crosshair; }
        
        body { 
            background: #050000; 
            color: #fff; 
            font-family: 'Poppins', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- INTRO HOROR --- */
        #intro {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .intro-text { 
            font-family: 'Nosifer', cursive; font-size: 3rem; color: #ff0000; 
            text-shadow: 0 0 30px #ff0000; animation: glitch 0.3s infinite;
        }

        /* --- GLITCH ANIMATION --- */
        @keyframes glitch {
            0% { transform: translate(2px, -2px); text-shadow: 2px 0 #00f2ea; }
            50% { transform: translate(-2px, 2px); text-shadow: -2px 0 #ff0050; }
            100% { transform: translate(0); }
        }

        /* --- GAME UI TEGANG --- */
        .container {
            width: 95%; max-width: 550px; margin: 40px auto; padding: 30px;
            background: rgba(10, 0, 0, 0.95); 
            border: 3px solid #400; border-radius: 10px;
            text-align: center; position: relative;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
            display: none; animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); box-shadow: 0 0 20px #400; }
            10% { transform: scale(1.02); box-shadow: 0 0 50px #f00; }
            20% { transform: scale(1); box-shadow: 0 0 20px #400; }
        }

        .stats { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 0.8rem; color: #ff0000; margin-bottom: 25px; }

        #question { 
            font-size: 1.3rem; min-height: 100px; font-weight: 900; 
            margin-bottom: 20px; color: #eee; text-transform: uppercase;
            border: 1px dashed #300; padding: 10px;
        }

        input { 
            width: 100%; padding: 18px; background: #000; border: 2px solid #200; 
            border-radius: 5px; color: #ff0000; text-align: center; margin-bottom: 20px; 
            font-weight: bold; font-size: 1.2rem; outline: none;
        }
        input:focus { border-color: #f00; background: #100; }

        .btn { 
            width: 100%; padding: 20px; border: none; font-family: 'Orbitron';
            background: #ff0000; color: #000; font-weight: 900; 
            cursor: pointer; letter-spacing: 5px; transition: 0.2s;
        }
        .btn:hover { background: #fff; color: #ff0000; }

        /* --- RED OVERLAY (Kaget pas salah) --- */
        #flash {
            position: fixed; inset: 0; background: #ff0000; 
            z-index: 9998; display: none; pointer-events: none;
        }

        /* --- FOOTER PROMOSI --- */
        .footer { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        .tiktok-btn { 
            text-decoration: none; background: #fff; color: #000; 
            padding: 12px; border-radius: 5px; font-weight: 900; font-size: 0.8rem;
            animation: pulse 1s infinite alternate;
        }
        .admin-link { color: #555; font-size: 0.7rem; text-decoration: none; }

        @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; } }

        /* Shake effect */
        .shake { animation: screenShake 0.1s infinite; }
        @keyframes screenShake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(0); } }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="intro">
        <h1 class="intro-text">BERANI MATI?</h1>
        <p style="letter-spacing: 8px; color: #333; margin-top: 20px;">200 SOAL NERAKA</p>
    </div>

    <div class="container" id="game">
        <div class="stats">
            <span>CHALLENGE: <b id="no">1</b>/200</span>
            <span>SOUL SCORE: <b id="score">0</b></span>
        </div>
        
        <div id="question">MEMBANGKITKAN SOAL...</div>
        
        <input type="text" id="ans" placeholder="JAWAB ATAU MUSNAH..." autocomplete="off">
        
        <button class="btn" onclick="check()">EKSEKUSI</button>

        <div class="footer">
            <a href="https://www.tiktok.com/@addisiuuuuuuiu" target="_blank" class="tiktok-btn">
                <i class="fab fa-tiktok"></i> FOLLOW @addisiuuuuuuiu
            </a>
            <a href="https://wa.me/6281539952533" class="admin-link">HUBUNGI ADMIN (NYERAH?)</a>
        </div>
    </div>

    <script>
        // --- 200 SOAL NERAKA GENERATOR ---
        const db = [];
        
        // Soal MTK (1-50)
        for(let i=1; i<=50; i++) {
            db.push({ q: `MTK: ${i*7} + ${i*3} - ${i} = ?`, a: ((i*7)+(i*3)-i).toString(), cat: "MATEMATIKA" });
        }
        // Soal IPA (51-100)
        const ipa = ["H2O itu apa?", "Pusat tata surya?", "Planet merah?", "Manusia bernapas pake?"];
        const ipaAns = ["air", "matahari", "mars", "oksigen"];
        for(let i=1; i<=50; i++) {
            let rand = i % ipa.length;
            db.push({ q: `IPA: ${ipa[rand]}`, a: ipaAns[rand], cat: "IPA" });
        }
        // Soal Bola (101-150)
        const bola = ["Madrid", "Ronaldo", "Messi", "MU", "City", "Lamine"];
        for(let i=1; i<=50; i++) {
            let rand = i % bola.length;
            db.push({ q: `BOLA: Siapa GOAT nomor ${i}?`, a: bola[rand].toLowerCase(), cat: "BOLA" });
        }
        // Soal Sejarah & Logika (151-200)
        for(let i=1; i<=50; i++) {
            db.push({ q: `LOGIKA: Berapa kaki ayam yang sudah digoreng ${i} kali?`, a: "0", cat: "LOGIKA" });
        }

        let current = 0;
        let score = 0;

        // Intro Logic (3 Detik Tegang)
        setTimeout(() => {
            document.getElementById('intro').style.transform = 'scale(2)';
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('game').style.display = 'block';
                load();
            }, 1000);
        }, 3000);

        function load() {
            if(current < 200) {
                document.getElementById('no').innerText = current + 1;
                document.getElementById('question').innerText = db[current].q;
            } else {
                document.getElementById('game').innerHTML = "<h1 class='intro-text'>LO MENANG!</h1><p>Otak lo beneran Titan. SIUUU!</p>";
            }
        }

        function check() {
            const user = document.getElementById('ans').value.toLowerCase().trim();
            const flash = document.getElementById('flash');
            const game = document.getElementById('game');

            if(user === db[current].a) {
                score += 666;
                current++;
                document.getElementById('score').innerText = score;
                document.getElementById('ans').value = "";
                load();
            } else {
                // EFEK SALAH (TEGANG BANGET)
                flash.style.display = 'block';
                game.classList.add('shake');
                
                setTimeout(() => {
                    flash.style.display = 'none';
                    game.classList.remove('shake');
                }, 200);

                document.getElementById('ans').value = "";
                alert("SALAH! MENTAL LO LEMAH!");
            }
        }

        // Support Enter
        document.getElementById('ans').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') check();
        });
    </script>
</body>
</html>
